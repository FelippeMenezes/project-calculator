<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="images/odin.ico">
    <title>Project Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="display">
                <input id="input-display" type="text" name="text" placeholder="0" />
            </div>
            <div class="buttons">
                <button class="memory-button">mc</button>
                <button class="memory-button">mr</button>
                <button class="memory-button">m-</button>
                <button class="memory-button">m+</button>
                <button class="button">AC</button>
                <button class="button">√x</button>
                <button class="button">%</button>
                <button class="operate-button">÷</button>
                <button class="white-button">7</button>
                <button class="white-button">8</button>
                <button class="white-button">9</button>
                <button class="operate-button">x</button>
                <button class="white-button">4</button>
                <button class="white-button">5</button>
                <button class="white-button">6</button>
                <button class="operate-button">-</button>
                <button class="white-button">1</button>
                <button class="white-button">2</button>
                <button class="white-button">3</button>
                <button class="operate-button">+</button>
                <button class="white-button">0</button>
                <button class="white-button">.</button>
                <button class="white-button">+/-</button>
                <button class="result-button">=</button>
                <button class="button">π</button>
                <button class="button">x<exponent>y</exponent></button>
                <button class="button">R2</button>
                <button class="button">R0</button>
            </div>
        </div>
    </div>
</body>
</html>
