<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="images/odin.ico">
    <title>Project Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="display">
                <input id="input-display" type="text" name="text" />
            </div>
            <div class="buttons">
                <button> mc </button>
                <button> mr </button>
                <button> m- </button>
                <button> m+ </button>
                <button> AC </button>
                <button> √x </button>
                <button> ÷ </button>
                <button> 7 </button>
                <button> 8 </button>
                <button> 9 </button>
                <button> x </button>
                <button> 4 </button>
                <button> 5 </button>
                <button> 6 </button>
                <button> - </button>
                <button> 1 </button>
                <button> 2 </button>
                <button> 3 </button>
                <button> + </button>
                <button> 0 </button>
                <button> . </button>
                <button> +/- </button>
                <button> = </button>
                <button> π </button>
                <button> xy </button>
                <button> R2 </button>
                <button> R0 </button>
            </div>
        </div>
    </div>
</body>
</html>
