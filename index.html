<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="images/odin.ico">
    <title>Project Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="display">
                <input id="input-display" type="text" name="text" placeholder="0" onkeydown="preventKeyboardInput(event)"/>
            </div>
            <div class="buttons">
                <button class="memory-button" id="mc">mc</button>
                <button class="memory-button" id="mr">mr</button>
                <button class="memory-button" id="m-">m-</button>
                <button class="memory-button" id="m+">m+</button>
                <button class="button" id="clear-btn">AC</button>
                <button class="button" id="√x">√x</button>
                <button class="button" id="%">%</button>
                <button class="operate-button" id="÷">÷</button>
                <button class="white-button" id="7">7</button>
                <button class="white-button" id="8">8</button>
                <button class="white-button" id="9">9</button>
                <button class="operate-button" id="*">x</button>
                <button class="white-button" id="4">4</button>
                <button class="white-button" id="5">5</button>
                <button class="white-button" id="6">6</button>
                <button class="operate-button" id="-">-</button>
                <button class="white-button" id="1">1</button>
                <button class="white-button" id="2">2</button>
                <button class="white-button" id="3">3</button>
                <button class="operate-button" id="+">+</button>
                <button class="white-button" id="0">0</button>
                <button class="white-button" id=".">.</button>
                <button class="white-button" id="+/-">+/-</button>
                <button class="result-button" id="=">=</button>
                <button class="button" id="pi">π</button>
                <button class="button" id="xy">x<exp class="exponent">y</exp></button>
                <button class="button" id="r2">R2</button>
                <button class="button" id="r0">R0</button>
            </div>
        </div>
        <footer class="footer">
            <p>Developed by <a href="https://github.com/FelippeMenezes" target="_blank" rel="noopener noreferrer">Felippe Menezes</a> for <strong>The Odin Project</strong></p>
        </footer>
    </div>
</body>
</html>
